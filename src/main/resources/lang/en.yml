  delete-success: "<prefix><green>NPC <yellow><npc></yellow> deleted.</green>"
  delete-missing: "<prefix><red>NPC <yellow><npc></yellow> not found.</red>"
  list-empty: "<prefix><gray>No NPCs found.</gray>"
  list-header: "<prefix><white>NPCs (<count>):</white>"
  list-entry: "<gray>•</gray> <yellow><npc></yellow> <dark_gray>(<world>, <x>, <y>, <z>)</dark_gray>"
  tp-success: "<prefix><green>Teleported to <yellow><npc></yellow>.</green>"
  info-header: "<prefix><white>NPC <yellow><npc></yellow></white>"
  info-line: "<gray><key>:</gray> <white><value></white>"
  pose-copied: "<prefix><green>Pose copied to buffer.</green>"
  pose-applied: "<prefix><green>Pose applied to <yellow><npc></yellow>.</green>"
