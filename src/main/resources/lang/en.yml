  admin-title: "<gradient:#7C3AED:#A855F7>SoulNPC</gradient> <dark_gray>—</dark_gray> <white>Editor</white>"
  edit-title: "<gradient:#7C3AED:#A855F7>SoulNPC</gradient> <dark_gray>—</dark_gray> <yellow><npc></yellow>"
  reload-name: "<yellow>Reload</yellow>"
