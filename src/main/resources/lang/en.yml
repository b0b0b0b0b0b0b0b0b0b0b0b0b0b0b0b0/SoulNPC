  reload-success: "<prefix><green>Configuration and NPCs reloaded.</green>"
  create-success: "<prefix><green>NPC <yellow><npc></yellow> created (<gray><type></gray>).</green>"
  create-exists: "<prefix><red>NPC <yellow><npc></yellow> already exists.</red>"
