help:
  - "<prefix><white>SoulNPC commands:</white>"
  - "<gray>/soulnpc create <id> [type]</gray> — player, zombie, fox_snow (white fox), …"
  - "<gray>/soulnpc delete <id></gray> — delete"
  - "<gray>/soulnpc edit</gray> — editor GUI"
  - "<gray>/soulnpc list</gray> — list NPCs"
  - "<gray>/soulnpc tp <id></gray> — teleport"
  - "<gray>/soulnpc info <id></gray> — info"
  - "<gray>/soulnpc pose copy|apply <id></gray> — poses"
  - "<gray>/soulnpc respawn <id></gray> — respawn"
  - "<gray>/soulnpc skin <id> [skin]</gray> — NPC skin (SkinRestorer)"
  - "<gray>Clicks in npc.yml: RMB, LMB, middle, shift-RMB, shift-LMB</gray>"
  - "<gray>Prefixes: [message], [player], [console], [op]</gray>"
  - "<gray>Mobs: type: MOB + entity-type; profiles in NpcMobProfileRegistry</gray>"
  - "<gray>Player NPC animations: npc.yml → animation.type (SPIN_ATTACK, USE_MAIN_HAND, …)</gray>"
