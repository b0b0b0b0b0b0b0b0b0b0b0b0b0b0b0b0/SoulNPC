prefix: "<gradient:#7C3AED:#A855F7>SoulNPC</gradient> <dark_gray>»</dark_gray> "

command:
  no-permission: "<prefix><red>Insufficient permissions.</red>"
  player-only: "<prefix><red>Players only.</red>"
