  - "<cmd:'/soulnpc delete <id>':gray> — delete"
  - "<cmd:'/soulnpc edit':gray> — editor GUI"
  - "<cmd:'/soulnpc list':gray> — list NPCs"
  - "<cmd:'/soulnpc tp <id>':gray> — teleport"
  - "<cmd:'/soulnpc info <id>':gray> — info"
  - "<cmd:'/soulnpc pose copy|apply <id>':gray> — poses"
  - "<cmd:'/soulnpc respawn <id>':gray> — respawn"
  - "<cmd:'/soulnpc skin <id> <name>':gray> — player NPC skin (SkinRestorer / url / file)"
