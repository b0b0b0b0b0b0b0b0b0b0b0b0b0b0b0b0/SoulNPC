help:
  - "<prefix><white>Команды SoulNPC:</white>"
  - "<gray>/soulnpc create <id> [тип]</gray> — player, zombie, fox_snow (белая лиса), …"
  - "<gray>/soulnpc delete <id></gray> — удалить"
  - "<gray>/soulnpc edit</gray> — GUI редактора"
  - "<gray>/soulnpc list</gray> — список NPC"
  - "<gray>/soulnpc tp <id></gray> — телепорт"
  - "<gray>/soulnpc info <id></gray> — информация"
  - "<gray>/soulnpc pose copy|apply <id></gray> — позы"
  - "<gray>/soulnpc respawn <id></gray> — переспавн"
  - "<gray>/soulnpc skin <id> [скин]</gray> — скин NPC (SkinRestorer)"
  - "<gray>Клики в npc.yml: ПКМ, ЛКМ, middle, shift-правый, shift-левый</gray>"
  - "<gray>Префиксы: [message], [player], [console], [op]</gray>"
  - "<gray>Мобы: type: MOB + entity-type; профили в NpcMobProfileRegistry</gray>"
  - "<gray>Анимации player NPC: npc.yml → animation.type (SPIN_ATTACK, USE_MAIN_HAND, …)</gray>"
